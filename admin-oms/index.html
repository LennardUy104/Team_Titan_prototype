<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>SUN* PH Objective Management System (OMS)</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" />
  <link rel="stylesheet" href="styles.css" />
  <link rel="icon" type="image/png" href="assets/oms-logo-mark-64.png" />
  <!-- Auth gate: unauthenticated visitors are sent to the login page (fake auth, prototype). -->
  <script>
    try {
      if (localStorage.getItem("titan-authed") !== "1") window.location.replace("login.html");
    } catch (e) { /* private mode — allow through */ }
  </script>
</head>
<body>
  <div class="app">
    <!-- Sidebar -->
    <aside class="sidebar">
      <div class="brand">
        <img class="brand-mark-img" src="assets/oms-logo-mark.png" alt="OMS logo" title="OMS — the colony of objectives" />
        <div class="brand-text">
          <span class="brand-word">SUN* OMS</span>
          <span class="brand-sub">PH Objective Management System</span>
        </div>
      </div>
      <div class="nav-section">Workspace</div>
      <nav class="nav" id="nav">
        <button class="nav-item active" data-view="analytics">
          <span class="nav-ico">▦</span> Analytics
        </button>
        <button class="nav-item" data-view="objectives">
          <span class="nav-ico">◎</span> My Objectives
        </button>
        <button class="nav-item" data-view="ai">
          <span class="nav-ico">✦</span> AI Assistant
        </button>
        <button class="nav-item" data-view="peer">
          <span class="nav-ico">★</span> Peer Review
        </button>
        <div class="nav-divider" data-leader-only></div>
        <button class="nav-item" data-view="feedback">
          <span class="nav-ico">✎</span> Feedback
        </button>
        <button class="nav-item" data-view="reports">
          <span class="nav-ico">▤</span> Reports
        </button>
        <button class="nav-item" data-view="admin">
          <span class="nav-ico">⚙</span> Admin
        </button>
      </nav>
      <div class="sidebar-foot">
        <button class="btn sm signout-btn" id="signout"><span>⤶</span> Sign out</button>
        <div class="mini-note">Prototype · dummy data</div>
      </div>
    </aside>

    <!-- Main -->
    <div class="main">
      <header class="topbar">
        <div class="topbar-title" id="topbar-title">Analytics</div>
        <div class="topbar-right">
          <button class="theme-switch" id="theme-switch" title="Change the look — cycle theme options">
            <span class="theme-dot" id="theme-dot"></span>
            <span class="theme-name" id="theme-name">Evergreen</span>
            <span class="theme-caret">▾</span>
          </button>
          <div class="role-switch" id="role-switch">
            <button class="role-btn active" data-role="employee">Employee</button>
            <button class="role-btn" data-role="leader">Leader</button>
          </div>
          <div class="user-chip" id="user-chip">
            <span class="avatar" id="user-avatar">AP</span>
            <span class="user-name" id="user-name">Abdul Palala</span>
          </div>
        </div>
      </header>

      <main class="content" id="content"><!-- views render here --></main>
    </div>
  </div>

  <!-- Modal host -->
  <div class="modal-overlay" id="modal-overlay" hidden>
    <div class="modal" id="modal"></div>
  </div>

  <!-- Data first, then view modules, then the app controller -->
  <script src="mock-data.js"></script>
  <script src="peer-assignments.js"></script>
  <script src="objective-evidence.js"></script>
  <script src="objective-proof.js"></script>
  <script src="objective-okr.js"></script>
  <script src="objective-form.js"></script>
  <script src="views-analytics.js"></script>
  <script src="views-objectives.js"></script>
  <script src="views-ai.js"></script>
  <script src="views-reviews.js"></script>
  <script src="views-peer.js"></script>
  <script src="views-reports.js"></script>
  <script src="admin-connectors.js"></script>
  <script src="views-admin.js"></script>
  <script src="app.js"></script>
</body>
</html>
