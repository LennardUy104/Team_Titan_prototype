<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>SUN* PH Objective Management System (OMS) — Sign in</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" />
  <link rel="stylesheet" href="styles.css" />
  <link rel="icon" href="data:image/svg+xml,%3Csvg%20xmlns='http://www.w3.org/2000/svg'%20viewBox='0%200%2024%2024'%3E%3Cg%20fill='none'%20stroke='%234e8a34'%20stroke-width='1.3'%20stroke-linecap='round'%3E%3Cpath%20d='M11%203.7%20L9%201.7'/%3E%3Cpath%20d='M13%203.7%20L15%201.7'/%3E%3Cpath%20d='M10.4%209%20L5.5%206.6'/%3E%3Cpath%20d='M13.6%209%20L18.5%206.6'/%3E%3Cpath%20d='M10.1%2010.4%20L4.8%2010.4'/%3E%3Cpath%20d='M13.9%2010.4%20L19.2%2010.4'/%3E%3Cpath%20d='M10.4%2011.6%20L5.9%2014.4'/%3E%3Cpath%20d='M13.6%2011.6%20L18.1%2014.4'/%3E%3C/g%3E%3Cg%20fill='%234e8a34'%3E%3Crect%20x='11.35'%20y='6.6'%20width='1.3'%20height='2.2'%20rx='.5'/%3E%3Crect%20x='11.25'%20y='11.4'%20width='1.5'%20height='1.6'%20rx='.5'/%3E%3Ccircle%20cx='12'%20cy='5'%20r='2.3'/%3E%3Ccircle%20cx='12'%20cy='10'%20r='2'/%3E%3Cellipse%20cx='12'%20cy='16.4'%20rx='3.2'%20ry='4.2'/%3E%3C/g%3E%3C/svg%3E" />
  <!-- Apply the theme chosen in the app before paint, so login matches. -->
  <script>
    try {
      var t = localStorage.getItem("titan-theme");
      if (t && t !== "evergreen") document.documentElement.setAttribute("data-theme", t);
    } catch (e) { /* private mode */ }
  </script>
</head>
<body>
  <main class="auth">
    <div class="auth-card">
      <div class="auth-logo"><span class="brand-mark" title="OMS — the colony of objectives"><svg viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg" aria-hidden="true"><g fill="none" stroke="currentColor" stroke-width="1.3" stroke-linecap="round"><path d="M11 3.7 L9 1.7"/><path d="M13 3.7 L15 1.7"/><path d="M10.4 9 L5.5 6.6"/><path d="M13.6 9 L18.5 6.6"/><path d="M10.1 10.4 L4.8 10.4"/><path d="M13.9 10.4 L19.2 10.4"/><path d="M10.4 11.6 L5.9 14.4"/><path d="M13.6 11.6 L18.1 14.4"/></g><g fill="currentColor"><rect x="11.35" y="6.6" width="1.3" height="2.2" rx=".5"/><rect x="11.25" y="11.4" width="1.5" height="1.6" rx=".5"/><circle cx="12" cy="5" r="2.3"/><circle cx="12" cy="10" r="2"/><ellipse cx="12" cy="16.4" rx="3.2" ry="4.2"/></g></svg></span></div>
      <div class="auth-appname">SUN* PH Objective Management System (OMS)</div>
      <h1 class="auth-title">Login to continue</h1>

      <div class="auth-divider"><span>with</span></div>

      <button type="button" class="google-btn" id="google-signin">
        <span class="g-badge">G</span>
        <span class="g-label">Sign in with Google</span>
      </button>

      <p class="auth-hint">Prototype — sign-in is simulated; no real Google account is used.</p>
    </div>
    <div class="auth-wave" aria-hidden="true"></div>
  </main>

  <script src="login.js"></script>
</body>
</html>
